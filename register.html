<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbyPeQ3UZ7jjpAhBnM3SaxKFxLU8X0-vSABwoQ3df0qgERVahDtz-PV_PUTG0u5QXtXq1Q/exec";

const q = id => document.getElementById(id);

let sessionMode = "Online";

// Mode toggle
q("modeOnline").onclick = () => {
  sessionMode = "Online";
  q("modeOnline").classList.add("active");
  q("modeOffline").classList.remove("active");
};

q("modeOffline").onclick = () => {
  sessionMode = "Offline";
  q("modeOffline").classList.add("active");
  q("modeOnline").classList.remove("active");
};

// Enable submit directly
q("submitBtn").disabled = false;
q("btnText").innerText = "🚀 Book My Free Session";

// Submit
q("submitBtn").onclick = async () => {

  const data = {
    name: q("uname").value,
    email: q("uemail").value,
    phone: q("uphone").value,
    exam: q("uexam").value,
    state: q("ustate").value,
    mode: sessionMode
  };

  if (!data.name || !data.phone || !data.exam || !data.state) {
    alert("Please fill all details");
    return;
  }

  try {
    await fetch(SHEET_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(data)
    });

    q("formContent").style.display = "none";
    q("successView").style.display = "block";

  } catch (error) {
    alert("Error submitting form");
  }
};
</script>
