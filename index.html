<style>
:root{
  --red:#E53935;--red-dark:#b71c1c;
  --blue:#1E64C8;--blue-dark:#0d3b7a;
  --silver:#8a9ab0;--silver-light:#c8d4e0;
  --ink:#0B0F1A;--ink-soft:#1e2535;
  --muted:#6b7280;--paper:#f4f7fc;
  --card:#fff;--ring:rgba(30,100,200,.22);
  --gold:#c9a84c;
}

/* ── DARK MODE VARIABLES ── */
body.dark-mode{
  --ink:#f0f4ff;--ink-soft:#c8d4e0;
  --muted:#8a9ab0;--paper:#0d1117;
  --card:#161b22;--ring:rgba(100,160,255,.3);
}
body.dark-mode .topbar{background:rgba(13,17,23,.96);border-bottom-color:rgba(100,160,255,.12)}
body.dark-mode .mobile-menu{background:#161b22;border-bottom-color:rgba(255,255,255,.06)}
body.dark-mode .mobile-menu a,body.dark-mode .mobile-menu span{color:#f0f4ff;border-color:rgba(255,255,255,.08)}
body.dark-mode .nav-chip:not(.yt){color:#c8d4e0;border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.05)}
body.dark-mode .pw-section{background:#161b22}
body.dark-mode .pw-eyebrow{background:#1e2535;border-color:rgba(255,255,255,.08)}
body.dark-mode .pw-eyebrow-text{color:#8a9ab0}
body.dark-mode .pw-h{color:#f0f4ff}
body.dark-mode .pw-sub{color:#8a9ab0}
body.dark-mode .pw-sub strong{color:#f0f4ff}
body.dark-mode .pw-tag{background:#1e2535;border-color:rgba(255,255,255,.08);color:#c8d4e0}
body.dark-mode .pw-tag:hover{background:#f0f4ff;color:#0B0F1A}
body.dark-mode .pw-card{background:#1e2535;border-color:rgba(255,255,255,.08)}
body.dark-mode .pw-card-title{color:#f0f4ff}
body.dark-mode .pw-mobile-card{background:#1e2535;border-color:rgba(255,255,255,.08)}
body.dark-mode .pw-mobile-title{color:#f0f4ff}
body.dark-mode .pw-bottom{border-top-color:rgba(255,255,255,.07)}
body.dark-mode .cf-section{background:linear-gradient(180deg,#0d1117 0%,#111827 100%)}
body.dark-mode .cf-eyebrow{background:#1e2535;border-color:rgba(255,255,255,.08);color:#8a9ab0}
body.dark-mode .cf-title{color:#f0f4ff}
body.dark-mode .cf-sub{color:#8a9ab0}
body.dark-mode .cf-sub strong{color:#f0f4ff}
body.dark-mode .cf-c1{background:linear-gradient(135deg,#1e1414,#161b22);border-color:rgba(229,57,53,.2)}
body.dark-mode .cf-c2{background:linear-gradient(135deg,#121a26,#161b22);border-color:rgba(30,100,200,.2)}
body.dark-mode .cf-c3{background:linear-gradient(135deg,#16191e,#161b22);border-color:rgba(138,154,176,.15)}
body.dark-mode .cf-c4{background:linear-gradient(135deg,#1e1414,#121a26);border-color:rgba(30,100,200,.15)}
body.dark-mode .cf-card p{color:#8a9ab0}
body.dark-mode .exams-section{background:linear-gradient(180deg,#0d1117 0%,#111827 100%)}
body.dark-mode .section-header h2{color:#f0f4ff}
body.dark-mode .section-header p{color:#8a9ab0}
body.dark-mode .card{background:#161b22;border-color:rgba(255,255,255,.07)}
body.dark-mode .card h3{color:#f0f4ff}
body.dark-mode .muted{color:#8a9ab0}
body.dark-mode .btn-outline{background:#161b22;color:#60a5fa;border-color:rgba(96,165,250,.3)}
body.dark-mode .btn-outline:hover{background:var(--blue);color:#fff}
body.dark-mode .note{background:#161b22;border-color:rgba(100,160,255,.15)}
body.dark-mode .note div{color:#c8d4e0}
body.dark-mode .intro-section{background:#161b22;border-bottom-color:rgba(255,255,255,.06)}
body.dark-mode .intro-section h2{color:#f0f4ff}
body.dark-mode .intro-section p{color:#8a9ab0}
body.dark-mode .slider-section{background:#161b22;border-top-color:rgba(255,255,255,.06)}
body.dark-mode .feature-card{background:#161b22;border-color:rgba(255,255,255,.07)}
body.dark-mode .feature-card h3{color:#f0f4ff}
body.dark-mode .feature-card p{color:#8a9ab0}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:"Plus Jakarta Sans",system-ui,sans-serif;color:var(--ink);background:var(--paper);line-height:1.7;overflow-x:hidden;transition:.3s background,.3s color}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(30,100,200,.10);box-shadow:0 2px 24px rgba(11,15,26,.08);transition:.3s all}
.topbar-inner{display:flex;align-items:center;gap:14px;max-width:1100px;margin:0 auto;padding:12px 24px}
.logo{width:42px;height:42px;object-fit:contain;flex-shrink:0;transition:.3s transform}
.logo:hover{transform:rotate(-5deg) scale(1.1)}
.brand{font-family:"Playfair Display",serif;font-weight:800;font-size:20px;background:linear-gradient(135deg,var(--red),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.2px}
.nav{margin-left:auto;display:flex;gap:8px;align-items:center}
.nav-chip{font-size:12px;font-weight:600;padding:6px 14px;border-radius:999px;background:transparent;border:1px solid rgba(11,15,26,.10);text-decoration:none;color:var(--ink-soft);transition:.2s all;white-space:nowrap;position:relative;overflow:hidden}
.nav-chip::after{content:"";position:absolute;inset:0;background:var(--blue);transform:scaleX(0);transform-origin:left;transition:.25s transform;z-index:-1}
.nav-chip:hover{color:#fff;border-color:var(--blue)}
.nav-chip:hover::after{transform:scaleX(1)}
.nav-chip.yt{background:var(--red);color:#fff;border-color:var(--red)}
.nav-chip.yt:hover{background:var(--red-dark)}

/* ── DARK MODE TOGGLE ── */
.dm-toggle{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 12px 6px 6px;
  border-radius:999px;
  background:transparent;
  border:1px solid rgba(11,15,26,.10);
  cursor:pointer;
  transition:.3s all;
  font-size:12px;font-weight:600;
  color:var(--ink-soft);
  white-space:nowrap;
}
.dm-toggle:hover{border-color:var(--blue);transform:translateY(-1px)}
.dm-pill{width:36px;height:20px;border-radius:999px;background:rgba(11,15,26,.10);position:relative;transition:.35s background;flex-shrink:0}
body.dark-mode .dm-pill{background:linear-gradient(135deg,var(--red),var(--blue))}
.dm-knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:.35s left;display:flex;align-items:center;justify-content:center;font-size:9px}
body.dark-mode .dm-knob{left:18px}
.dm-label{transition:.3s color}

/* Hamburger */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;border:none;background:transparent;margin-left:auto}
.hamburger span{display:block;width:24px;height:2px;background:var(--ink);border-radius:2px;transition:.3s}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-menu{display:none;position:fixed;top:65px;left:0;right:0;background:#fff;border-bottom:1px solid rgba(11,15,26,.08);padding:16px 20px;box-shadow:0 8px 24px rgba(11,15,26,.12);z-index:99;flex-direction:column;gap:10px;transition:.3s background}
.mobile-menu.open{display:flex}
.mobile-menu a,.mobile-menu span{display:block;padding:12px 16px;border-radius:12px;font-size:14px;font-weight:600;color:var(--ink);text-decoration:none;border:1px solid rgba(11,15,26,.08);transition:.2s background}
.mobile-menu a:hover{background:rgba(30,100,200,.06)}
.mobile-menu .m-yt{background:var(--red);color:#fff;border-color:var(--red);text-align:center}
@media(max-width:680px){.nav{display:none}.hamburger{display:flex}}

/* ── HERO ── */
.hero{position:relative;overflow:hidden;min-height:580px;display:flex;align-items:center;background:url("assets/img/hero-bg.jpg") center 15%/cover no-repeat}
.hero::before{content:"";position:absolute;inset:0;background:linear-gradient(108deg,rgba(11,15,26,.92) 0%,rgba(13,59,122,.80) 38%,rgba(30,100,200,.40) 62%,rgba(11,15,26,.06) 100%);z-index:1}
.hero::after{content:"";position:absolute;inset:0;background-image:repeating-linear-gradient(-55deg,transparent,transparent 40px,rgba(255,255,255,.015) 40px,rgba(255,255,255,.015) 41px);z-index:1;pointer-events:none}
.hero-inner{position:relative;z-index:2;max-width:1100px;margin:0 auto;padding:72px 24px 88px;width:100%;display:grid;grid-template-columns:55% 45%;align-items:center;gap:40px}
.hero-left>*{opacity:0;transform:translateY(24px);animation:fadeUp .8s forwards ease-out}
.hero-left>*:nth-child(1){animation-delay:.1s}
.hero-left>*:nth-child(2){animation-delay:.22s}
.hero-left>*:nth-child(3){animation-delay:.36s}
.hero-left>*:nth-child(4){animation-delay:.50s}
.hero-left>*:nth-child(5){animation-delay:.64s}
@keyframes fadeUp{to{opacity:1;transform:none}}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.22);color:var(--silver-light);font-size:11px;font-weight:700;letter-spacing:1.2px;padding:7px 18px;border-radius:999px;backdrop-filter:blur(10px);text-transform:uppercase;margin-bottom:22px}
.badge-pulse{width:8px;height:8px;border-radius:50%;background:#4ade80;box-shadow:0 0 0 0 rgba(74,222,128,.6);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(74,222,128,.6)}70%{box-shadow:0 0 0 8px rgba(74,222,128,0)}100%{box-shadow:0 0 0 0 rgba(74,222,128,0)}}
.hero h1{font-family:"Playfair Display",serif;font-size:clamp(28px,4vw,52px);font-weight:800;line-height:1.15;color:#fff;letter-spacing:-.3px;margin-bottom:18px;text-shadow:0 2px 24px rgba(0,0,0,.3)}
.typewriter{display:inline;background:linear-gradient(90deg,#f87171,#fb923c,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cursor-blink{display:inline-block;width:3px;height:.9em;background:#fb923c;margin-left:2px;vertical-align:middle;animation:cur .7s infinite}
@keyframes cur{0%,100%{opacity:1}50%{opacity:0}}
.hero-sub{color:rgba(200,212,224,.88);font-size:16px;line-height:1.75;margin-bottom:32px;max-width:430px}
.cta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:36px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 24px;border-radius:12px;text-decoration:none;font-weight:700;font-size:14px;border:1px solid transparent;cursor:pointer;transition:.25s transform,.25s box-shadow,.25s background;white-space:nowrap;position:relative;overflow:hidden}
.btn:active{transform:scale(.97)}
.btn:hover{transform:translateY(-3px)}
.btn::before{content:"";position:absolute;top:0;left:-75%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);transform:skewX(-20deg);transition:.0s}
.btn:hover::before{left:125%;transition:.5s left}
.btn-primary{background:#fff;color:var(--ink);box-shadow:0 4px 20px rgba(0,0,0,.18)}
.btn-primary:hover{box-shadow:0 8px 30px rgba(0,0,0,.25)}
.btn-blue{background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:#fff;box-shadow:0 4px 18px rgba(30,100,200,.45)}
.btn-blue:hover{box-shadow:0 8px 28px rgba(30,100,200,.55)}
.btn-ghost{background:rgba(255,255,255,.10);color:#fff;border-color:rgba(255,255,255,.28);backdrop-filter:blur(8px)}
.btn-ghost:hover{background:rgba(255,255,255,.2)}
.btn-yt{background:linear-gradient(135deg,#ff0000,#cc0000);color:#fff;box-shadow:0 4px 16px rgba(255,0,0,.35)}
.btn-yt:hover{box-shadow:0 8px 24px rgba(255,0,0,.45)}
.hero-stats{display:flex;border:1px solid rgba(255,255,255,.14);border-radius:16px;overflow:hidden;backdrop-filter:blur(10px);background:rgba(255,255,255,.07);width:fit-content}
.stat{padding:14px 26px;text-align:center;border-right:1px solid rgba(255,255,255,.10);transition:.3s background}
.stat:hover{background:rgba(255,255,255,.12)}
.stat:last-child{border-right:none}
.stat-num{font-size:24px;font-weight:800;color:#fff;font-family:"Playfair Display",serif;line-height:1}
.stat-label{font-size:10px;color:rgba(255,255,255,.5);margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
@media(max-width:860px){
  .hero-inner{grid-template-columns:1fr;padding:52px 20px 64px}
  .hero-right{display:none}
  .hero::before{background:linear-gradient(160deg,rgba(11,15,26,.94) 0%,rgba(13,59,122,.85) 50%,rgba(11,15,26,.70) 100%)}
  .hero-stats{width:100%}.stat{flex:1;padding:11px 6px}.stat-num{font-size:19px}
  .cta .btn{padding:11px 16px;font-size:13px}
}
.divider{height:4px;background:linear-gradient(90deg,var(--red),var(--silver),var(--blue));position:relative;overflow:hidden}
.divider::after{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent);animation:shimmer 2.5s infinite}
@keyframes shimmer{to{left:140%}}
.reveal{opacity:0;transform:translateY(36px);transition:opacity .7s ease,transform .7s ease}
.reveal.visible{opacity:1;transform:none}
.reveal-left{opacity:0;transform:translateX(-36px);transition:opacity .7s ease,transform .7s ease}
.reveal-left.visible{opacity:1;transform:none}
.reveal-right{opacity:0;transform:translateX(36px);transition:opacity .7s ease,transform .7s ease}
.reveal-right.visible{opacity:1;transform:none}
.intro-section{background:#fff;padding:52px 24px;text-align:center;border-bottom:1px solid rgba(11,15,26,.06);transition:.3s background,.3s border-color}
.intro-section h2{font-family:"Playfair Display",serif;font-size:clamp(22px,3vw,32px);font-weight:700;margin-bottom:12px}
.intro-section p{max-width:700px;margin:0 auto;color:var(--muted);font-size:16px;line-height:1.8}
.features{max-width:1100px;margin:0 auto;padding:52px 24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.feature-card{background:var(--card);border:1px solid rgba(11,15,26,.06);border-radius:18px;padding:28px 24px;box-shadow:0 4px 20px rgba(11,15,26,.05);transition:.3s transform,.3s box-shadow,.3s border-color,.3s background;position:relative;overflow:hidden;cursor:default}
.feature-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--blue));transform:scaleX(0);transform-origin:left;transition:.3s transform}
.feature-card::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(229,57,53,.03),rgba(30,100,200,.03));opacity:0;transition:.3s opacity}
.feature-card:hover{transform:translateY(-6px);box-shadow:0 20px 44px rgba(11,15,26,.11);border-color:var(--ring)}
.feature-card:hover::before{transform:scaleX(1)}
.feature-card:hover::after{opacity:1}
.feat-icon{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px;transition:.3s transform,.3s box-shadow}
.feature-card:hover .feat-icon{transform:scale(1.12) rotate(-6deg);box-shadow:0 8px 20px rgba(0,0,0,.12)}
.feat-icon.red{background:rgba(229,57,53,.10)}
.feat-icon.blue{background:rgba(30,100,200,.10)}
.feat-icon.silver{background:rgba(138,154,176,.12)}
.feature-card h3{font-size:16px;font-weight:700;margin-bottom:8px;position:relative;z-index:1}
.feature-card p{font-size:14px;color:var(--muted);line-height:1.65;position:relative;z-index:1}
</style>
